name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git \
          zip \
          unzip \
          openjdk-11-jdk \
          python3-pip \
          autoconf \
          libtool \
          pkg-config \
          zlib1g-dev \
          libncurses5-dev \
          libncursesw5-dev \
          libtinfo5 \
          cmake \
          libffi-dev \
          libssl-dev \
          liblzma-dev \
          sqlite3 \
          libsqlite3-dev \
          libjpeg-dev \
          libfreetype6-dev \
          libpng-dev
    
    - name: Install Python dependencies 
      run: | 
        python -m pip install --upgrade pip setuptools virtualenv 
        pip install cython
        pip install buildozer 
    
    - name: Build APK
      run: |
        buildozer android debug
      timeout-minutes: 120
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: BoxCalculator-APK
        path: bin/*.apk
        retention-days: 30
    
    - name: List generated files
      run: |
        echo "Generated files:"
        ls -la bin/
